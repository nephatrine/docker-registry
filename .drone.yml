---
kind: pipeline
type: exec
name: default

platform:
  os: linux
  arch: amd64

steps:
- name: build
  commands:
  - docker build --pull -t pdr.nephatrine.net/nephatrine/docker-registry:testing .
  - HOME=/mnt/config/home docker push pdr.nephatrine.net/nephatrine/docker-registry:testing
  - docker tag pdr.nephatrine.net/nephatrine/docker-registry:testing nephatrine/docker-registry:testing
  - HOME=/mnt/config/home docker push nephatrine/docker-registry:testing
  - docker rmi pdr.nephatrine.net/nephatrine/docker-registry:testing

---
kind: pipeline
name: after

steps:
- name: notify
  image: appleboy/drone-discord
  settings:
    avatar_url: https://files.nephatrine.net/Images/Buttons/Drone.png
    message: "Automated build of **{{repo.name}}:{{commit.branch}}** has returned [{{build.status}}]({{build.link}})."
    username: DroneCI
    webhook_id:
      from_secret: wh-infra-id
    webhook_token:
      from_secret: wh-infra-tok

depends_on:
- default

trigger:
  status:
  - success
  - failure

---
kind: signature
hmac: bc2f61c3319ded8073f11b82e0de32c04bb9c85bfe43bcde78931691ce1b62a1

...
